<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Google Sheets Sharing Live Dashboard</title>
  <style>
    body{margin:0;font-family:Arial;background:#eef4fb;color:#111827}
    .hero{padding:28px;background:linear-gradient(135deg,#0f9d58,#1a73e8);color:white;border-radius:0 0 28px 28px}
    .hero h1{margin:0;font-size:30px}.hero p{margin:8px 0 0}
    .wrap{padding:22px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
    input,select,button{padding:11px 13px;border-radius:10px;border:1px solid #d1d5db;font-size:14px}
    input{min-width:280px}button{border:0;color:white;font-weight:700;cursor:pointer}
    .blue{background:#1a73e8}.green{background:#0f9d58}.orange{background:#f29900}.dark{background:#374151}.red{background:#dc2626}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:18px}
    .stat,.panel,.sheet-card{background:white;border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.08)}
    .stat{padding:18px}.num{font-size:28px;font-weight:900;color:#1a73e8}.label{font-size:13px;color:#6b7280}
    .panel{padding:16px;margin-bottom:18px}
    .progress{height:14px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:10px}
    .fill{height:100%;width:0%;background:linear-gradient(90deg,#0f9d58,#1a73e8);transition:.3s}
    .tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    .tab{background:white;color:#111;border:1px solid #d1d5db}.tab.active{background:#1a73e8;color:white}
    table{width:100%;border-collapse:collapse;background:white;border-radius:16px;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.08)}
    th,td{padding:10px;border-bottom:1px solid #edf2f7;text-align:left;font-size:13px}
    th{background:#f8fafc;text-transform:uppercase;font-size:12px}
    tr:hover{background:#f9fafb}a{color:#1a73e8}
    .badge{display:inline-block;padding:5px 9px;background:#e8f0fe;color:#174ea6;border-radius:999px;font-size:12px;font-weight:800}
    .sheet-card{margin-bottom:16px;overflow:hidden}.sheet-head{padding:16px;background:#f8fafc;border-bottom:1px solid #e5e7eb}
    .sheet-title{font-size:18px;font-weight:900}.sheet-title a{text-decoration:none}
    .meta,.small{color:#6b7280;font-size:12px}
    .empty{background:white;border-radius:16px;padding:28px;text-align:center;color:#6b7280;box-shadow:0 4px 14px rgba(0,0,0,.08)}
    .logs{max-height:180px;overflow:auto;font-size:12px;background:#111827;color:#d1d5db;border-radius:12px;padding:12px}
  </style>
</head>

<body>
<div class="hero">
  <h1>📊 Google Sheets Sharing Live Dashboard</h1>
  <p>GitHub hosted dashboard + Apps Script backend + live Google Sheet database</p>
</div>

<div class="wrap">
  <div class="toolbar">
    <input id="search" placeholder="Search user, email, role..." onkeyup="render()">
    <select id="sheetFilter" onchange="render()"><option value="">All Sheets</option></select>
    <select id="roleFilter" onchange="render()">
      <option value="">All Roles</option>
      <option value="owner">Owner</option>
      <option value="writer">Writer / Editor</option>
      <option value="reader">Reader / Viewer</option>
      <option value="commenter">Commenter</option>
    </select>
    <button class="blue" onclick="loadData()">🔄 Refresh View</button>
    <button class="green" onclick="startScan(false)">▶ Scan / Update</button>
    <button class="red" onclick="startScan(true)">♻ Full Rescan</button>
    <button class="orange" onclick="downloadCSV()">⬇ CSV</button>
    <button class="dark" onclick="bulkEmail()">📧 Bulk Gmail</button>
  </div>

  <div class="cards">
    <div class="stat"><div class="num" id="totalSheets">0</div><div class="label">Total Sheets</div></div>
    <div class="stat"><div class="num" id="rowsCount">0</div><div class="label">Permission Rows</div></div>
    <div class="stat"><div class="num" id="uniqueEmails">0</div><div class="label">Unique Emails</div></div>
    <div class="stat"><div class="num" id="editors">0</div><div class="label">Editors</div></div>
    <div class="stat"><div class="num" id="viewers">0</div><div class="label">Viewers</div></div>
    <div class="stat"><div class="num" id="commenters">0</div><div class="label">Commenters</div></div>
  </div>

  <div class="panel">
    <b id="statusText">Loading...</b>
    <div class="small" id="backendText"></div>
    <div class="progress"><div class="fill" id="progressFill"></div></div>
  </div>

  <div class="panel">
    <b>Live Logs</b>
    <div class="logs" id="logs">Loading logs...</div>
  </div>

  <div class="tabs">
    <button class="tab active" id="groupBtn" onclick="setView('group')">📁 Group by Sheet</button>
    <button class="tab" id="tableBtn" onclick="setView('table')">📋 Table View</button>
  </div>

  <div id="content"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxa9yl3gGYMRLyxT7-z6x7F1KN72QvzQv5LsBimOpewuW_Crm_A-F-FYNQu32XpxoUg/exec";
const ADMIN_TOKEN = "12345";

let allRows = [];
let filteredRows = [];
let viewMode = "group";
let backendUrl = "";

function jsonp(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cb = "cb_" + Date.now() + "_" + Math.floor(Math.random() * 99999);
    params.action = action;
    params.callback = cb;

    const url = API_URL + "?" + new URLSearchParams(params).toString();
    const script = document.createElement("script");

    window[cb] = data => {
      delete window[cb];
      script.remove();
      resolve(data);
    };

    script.onerror = () => {
      delete window[cb];
      script.remove();
      reject(new Error("API load failed"));
    };

    script.src = url;
    document.body.appendChild(script);
  });
}

async function loadData(){
  document.getElementById("statusText").innerText = "Loading live backend data...";
  const res = await jsonp("data");

  if(!res.ok){
    alert(res.error || "Backend not ready");
    return;
  }

  allRows = res.rows || [];
  backendUrl = res.backendUrl || "";
  document.getElementById("backendText").innerHTML = backendUrl ? "Backend: <a target='_blank' href='"+backendUrl+"'>Open Google Sheet Database</a>" : "";

  fillSheetFilter();
  render();
  renderLogs(res.logs || []);
  document.getElementById("statusText").innerText = "Live data loaded ✅";
}

async function loadStatus(){
  const res = await jsonp("status");
  if(!res.ok) return;

  const pct = res.total ? Math.round((res.processed / res.total) * 100) : 0;
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("statusText").innerText =
    res.status + " | " + res.processed + " / " + res.total + " | Added: " + res.added + " | Skipped: " + res.skipped;
}

async function loadLogs(){
  const res = await jsonp("logs");
  if(res.ok) renderLogs(res.logs || []);
}

async function startScan(full){
  if(full && !confirm("Full rescan old raw data clear karega. Continue?")) return;

  const res = await jsonp("startScan", {
    token: ADMIN_TOKEN,
    full: full ? "true" : "false"
  });

  if(!res.ok){
    alert(res.error);
    return;
  }

  processBatchLoop();
}

async function processBatchLoop(){
  const res = await jsonp("processBatch", {token: ADMIN_TOKEN});

  if(!res.ok){
    alert(res.error);
    return;
  }

  await loadStatus();
  await loadLogs();
  await loadData();

  if(!res.done){
    setTimeout(processBatchLoop, 1200);
  }
}

function fillSheetFilter(){
  const current = document.getElementById("sheetFilter").value;
  const sheets = [...new Set(allRows.map(r => r.sheetName).filter(Boolean))].sort();

  let html = '<option value="">All Sheets</option>';
  sheets.forEach(s => html += '<option value="'+escAttr(s)+'">'+esc(s)+'</option>');

  document.getElementById("sheetFilter").innerHTML = html;
  document.getElementById("sheetFilter").value = current;
}

function render(){
  const q = document.getElementById("search").value.toLowerCase();
  const sheet = document.getElementById("sheetFilter").value;
  const role = document.getElementById("roleFilter").value;

  filteredRows = allRows.filter(r => {
    const match =
      String(r.sheetName||"").toLowerCase().includes(q) ||
      String(r.ownerName||"").toLowerCase().includes(q) ||
      String(r.ownerEmail||"").toLowerCase().includes(q) ||
      String(r.userName||"").toLowerCase().includes(q) ||
      String(r.userEmail||"").toLowerCase().includes(q) ||
      String(r.role||"").toLowerCase().includes(q) ||
      String(r.type||"").toLowerCase().includes(q);

    return match && (!sheet || r.sheetName === sheet) && (!role || r.role === role);
  });

  updateStats();
  viewMode === "table" ? renderTable() : renderGroup();
}

function updateStats(){
  document.getElementById("totalSheets").innerText = new Set(filteredRows.map(r=>r.fileId)).size;
  document.getElementById("rowsCount").innerText = filteredRows.length;
  document.getElementById("uniqueEmails").innerText = new Set(filteredRows.map(r=>r.userEmail).filter(Boolean)).size;
  document.getElementById("editors").innerText = filteredRows.filter(r=>r.role==="writer").length;
  document.getElementById("viewers").innerText = filteredRows.filter(r=>r.role==="reader").length;
  document.getElementById("commenters").innerText = filteredRows.filter(r=>r.role==="commenter").length;
}

function renderGroup(){
  if(!filteredRows.length){
    document.getElementById("content").innerHTML = "<div class='empty'>No data found.</div>";
    return;
  }

  const groups = {};
  filteredRows.forEach(r => {
    if(!groups[r.fileId]){
      groups[r.fileId] = {sheetName:r.sheetName, sheetUrl:r.sheetUrl, ownerName:r.ownerName, ownerEmail:r.ownerEmail, rows:[]};
    }
    groups[r.fileId].rows.push(r);
  });

  let html = "";
  Object.values(groups).forEach(g => {
    html += `
      <div class="sheet-card">
        <div class="sheet-head">
          <div class="sheet-title"><a href="${escAttr(g.sheetUrl)}" target="_blank">📄 ${esc(g.sheetName)}</a></div>
          <div class="meta">Owner: ${esc(g.ownerName)} &lt;${esc(g.ownerEmail)}&gt; | Entries: <b>${g.rows.length}</b></div>
        </div>
        <table>
          <thead><tr><th>User</th><th>Email</th><th>Role</th><th>Type</th><th>Open</th><th>Mail</th></tr></thead>
          <tbody>
    `;

    g.rows.forEach(r => html += shortRow(r));
    html += "</tbody></table></div>";
  });

  document.getElementById("content").innerHTML = html;
}

function renderTable(){
  if(!filteredRows.length){
    document.getElementById("content").innerHTML = "<div class='empty'>No data found.</div>";
    return;
  }

  let html = `
    <table>
      <thead><tr><th>Sheet</th><th>Owner</th><th>User</th><th>Email</th><th>Role</th><th>Type</th><th>Open</th><th>Mail</th></tr></thead>
      <tbody>
  `;

  filteredRows.forEach(r => html += fullRow(r));
  html += "</tbody></table>";
  document.getElementById("content").innerHTML = html;
}

function shortRow(r){
  return `
    <tr>
      <td>${esc(r.userName || "-")}</td>
      <td>${r.userEmail ? '<a href="mailto:'+escAttr(r.userEmail)+'">'+esc(r.userEmail)+'</a>' : '-'}</td>
      <td><span class="badge">${esc(r.role || "-")}</span></td>
      <td>${esc(r.type || "-")}</td>
      <td><a target="_blank" href="${escAttr(r.sheetUrl)}">Open</a></td>
      <td>${r.userEmail ? '<a target="_blank" href="https://mail.google.com/mail/?view=cm&fs=1&to='+encodeURIComponent(r.userEmail)+'">Mail</a>' : '-'}</td>
    </tr>
  `;
}

function fullRow(r){
  return `
    <tr>
      <td>${esc(r.sheetName)}</td>
      <td>${esc(r.ownerName)}<br><span class="small">${esc(r.ownerEmail)}</span></td>
      <td>${esc(r.userName || "-")}</td>
      <td>${r.userEmail ? '<a href="mailto:'+escAttr(r.userEmail)+'">'+esc(r.userEmail)+'</a>' : '-'}</td>
      <td><span class="badge">${esc(r.role || "-")}</span></td>
      <td>${esc(r.type || "-")}</td>
      <td><a target="_blank" href="${escAttr(r.sheetUrl)}">Open</a></td>
      <td>${r.userEmail ? '<a target="_blank" href="https://mail.google.com/mail/?view=cm&fs=1&to='+encodeURIComponent(r.userEmail)+'">Mail</a>' : '-'}</td>
    </tr>
  `;
}

function renderLogs(logs){
  if(!logs.length){
    document.getElementById("logs").innerHTML = "No logs yet.";
    return;
  }

  document.getElementById("logs").innerHTML = logs.reverse().map(l =>
    "<div>[" + esc(l.time) + "] " + esc(l.log) + "</div>"
  ).join("");
}

function setView(mode){
  viewMode = mode;
  document.getElementById("groupBtn").classList.toggle("active", mode==="group");
  document.getElementById("tableBtn").classList.toggle("active", mode==="table");
  render();
}

function downloadCSV(){
  const rows = [["Sheet Name","Sheet URL","Owner Name","Owner Email","User Name","User Email","Role","Type","Scanned At"]];
  filteredRows.forEach(r => rows.push([r.sheetName,r.sheetUrl,r.ownerName,r.ownerEmail,r.userName,r.userEmail,r.role,r.type,r.scannedAt]));

  const csv = rows.map(row => row.map(v => '"' + String(v || "").replace(/"/g,'""') + '"').join(",")).join("\\n");
  const blob = new Blob([csv], {type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "google_sheets_sharing_report.csv";
  a.click();
  URL.revokeObjectURL(url);
}

function bulkEmail(){
  const emails = [...new Set(filteredRows.map(r=>r.userEmail).filter(Boolean))];
  if(!emails.length){alert("No emails found.");return;}

  const subject = encodeURIComponent("Google Sheets Access Review");
  const body = encodeURIComponent("Hello,\\n\\nPlease review your Google Sheets access.\\n\\nThanks.");

  window.open("https://mail.google.com/mail/?view=cm&fs=1&to="+encodeURIComponent(emails.join(","))+"&su="+subject+"&body="+body,"_blank");
}

function esc(t){return String(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");}
function escAttr(t){return esc(t);}

loadData();
setInterval(loadData, 10000);
setInterval(loadStatus, 5000);
setInterval(loadLogs, 5000);
</script>
</body>
</html>
